name: Release Builds

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.38.5"
  ANDROID_PLATFORM: "android-35"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_NDK: "28.2.13676358"

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "${{ env.FLUTTER_VERSION }}"
          channel: stable
          cache: true

      - name: Install Android SDK components
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;${ANDROID_PLATFORM}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK}"

      - name: Create CI private config fallback
        run: |
          mkdir -p lib/app/private
          cat > lib/app/private/ads_private.dart <<'DART'
          enum AdType {
            googleBannerAd,
            googleRewardedAd,
          }

          class AdsPrivate {
            static bool getEnable() => false;

            static String getAdID(AdType type, {String name = ''}) => '';
          }
          DART

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Collect Android artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/*.apk dist/

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: karing-android
          path: dist/*.apk
          if-no-files-found: error

  windows:
    name: Windows ZIP
    runs-on: windows-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "${{ env.FLUTTER_VERSION }}"
          channel: stable
          cache: true

      - name: Create CI private config fallback
        run: |
          New-Item -ItemType Directory -Force lib/app/private | Out-Null
          @'
          enum AdType {
            googleBannerAd,
            googleRewardedAd,
          }

          class AdsPrivate {
            static bool getEnable() => false;

            static String getAdID(AdType type, {String name = ''}) => '';
          }
          '@ | Set-Content -Encoding utf8 lib/app/private/ads_private.dart

      - name: Create optional native core directory
        run: New-Item -ItemType Directory -Force bind/windows/core | Out-Null

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows app
        run: flutter build windows --release

      - name: Package Windows app
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath dist/karing-windows-x64.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: karing-windows
          path: dist/karing-windows-x64.zip
          if-no-files-found: error

  macos:
    name: macOS ZIP
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "${{ env.FLUTTER_VERSION }}"
          channel: stable
          cache: true

      - name: Create CI private config fallback
        run: |
          mkdir -p lib/app/private
          cat > lib/app/private/ads_private.dart <<'DART'
          enum AdType {
            googleBannerAd,
            googleRewardedAd,
          }

          class AdsPrivate {
            static bool getEnable() => false;

            static String getAdID(AdType type, {String name = ''}) => '';
          }
          DART

      - name: Install dependencies
        run: flutter pub get

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Build macOS app
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
        run: flutter build macos --release

      - name: Package macOS app
        run: |
          mkdir -p dist
          APP_PATH="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No macOS .app bundle found"
            find build/macos/Build/Products -maxdepth 3 -print
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" dist/karing-macos.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: karing-macos
          path: dist/karing-macos.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - android
      - windows
      - macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(sed -nE 's/^version:[[:space:]]*([^[:space:]]+).*/\1/p' pubspec.yaml | head -n 1)"
          TAG="v${VERSION}-r${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          TITLE="Karing ${VERSION} (run ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT})"

          {
            echo "Automated GitHub Actions release."
            echo
            echo "Commit: ${GITHUB_SHA}"
          } > release-notes.md

          mapfile -t ASSETS < <(find release-assets -type f | sort)
          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi

          gh release create "$TAG" "${ASSETS[@]}" \
            --title "$TITLE" \
            --notes-file release-notes.md \
            --target "$GITHUB_SHA"
