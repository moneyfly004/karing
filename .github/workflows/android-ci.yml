name: Release Builds

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.38.5"
  ANDROID_PLATFORM: "android-35"
  ANDROID_BUILD_TOOLS: "36.0.0"
  ANDROID_NDK: "28.2.13676358"
  UPSTREAM_RELEASE: "v1.2.20.2308"
  UPSTREAM_RELEASE_BASE: "https://github.com/KaringX/karing/releases/download/v1.2.20.2308"

jobs:
  android:
    name: Android APKs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release names
        run: |
          VERSION_RAW="$(sed -nE 's/^version:[[:space:]]*([^[:space:]]+).*/\1/p' pubspec.yaml | head -n 1)"
          VERSION="${VERSION_RAW/+/.}"
          echo "VERSION_RAW=${VERSION_RAW}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "ASSET_PREFIX=karing_${VERSION}" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "${{ env.FLUTTER_VERSION }}"
          channel: stable
          cache: true

      - name: Install Android SDK components
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;${ANDROID_PLATFORM}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK}"

      - name: Create CI private config fallback
        run: |
          mkdir -p lib/app/private
          cat > lib/app/private/ads_private.dart <<'DART'
          enum AdType {
            googleBannerAd,
            googleRewardedAd,
          }

          class AdsPrivate {
            static bool getEnable() => false;

            static String getAdID(AdType type, {String name = ''}) => '';
          }
          DART

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APKs
        run: |
          flutter build apk --release
          mkdir -p ci-artifacts/android
          cp build/app/outputs/flutter-apk/app-release.apk ci-artifacts/android/app-release.apk
          flutter build apk --release --split-per-abi --target-platform android-arm,android-arm64

      - name: Collect Android release assets
        run: |
          mkdir -p dist
          cp ci-artifacts/android/app-release.apk "dist/${ASSET_PREFIX}_android_arm.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "dist/${ASSET_PREFIX}_android_arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "dist/${ASSET_PREFIX}_android_armeabi-v7a.apk"
          ls -lh dist

      - name: Upload Android release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-android
          path: dist/*
          if-no-files-found: error

  windows:
    name: Windows installer and ZIP
    runs-on: windows-2022
    timeout-minutes: 90

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release names
        run: |
          $versionRaw = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(\S+)' | Select-Object -First 1).Matches.Groups[1].Value
          $version = $versionRaw.Replace('+', '.')
          "VERSION_RAW=$versionRaw" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ASSET_PREFIX=karing_$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "${{ env.FLUTTER_VERSION }}"
          channel: stable
          cache: true

      - name: Create CI private config fallback
        run: |
          New-Item -ItemType Directory -Force lib/app/private | Out-Null
          @'
          enum AdType {
            googleBannerAd,
            googleRewardedAd,
          }

          class AdsPrivate {
            static bool getEnable() => false;

            static String getAdID(AdType type, {String name = ''}) => '';
          }
          '@ | Set-Content -Encoding utf8 lib/app/private/ads_private.dart

      - name: Restore Windows runtime core from upstream release
        run: |
          New-Item -ItemType Directory -Force bind/windows/core | Out-Null
          Invoke-WebRequest `
            -Uri "${{ env.UPSTREAM_RELEASE_BASE }}/karing_1.2.20.2308_windows_x64.zip" `
            -OutFile upstream-windows.zip
          Expand-Archive -Path upstream-windows.zip -DestinationPath upstream-windows -Force
          Copy-Item upstream-windows/karingService.exe bind/windows/core/ -Force
          Copy-Item upstream-windows/libcronet.dll bind/windows/core/ -Force
          Copy-Item upstream-windows/sqlite3.dll bind/windows/core/ -Force
          Copy-Item upstream-windows/sqlite3_connection_pool.dll bind/windows/core/ -Force

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install packaging tools
        run: |
          dart pub global activate flutter_distributor
          "PATH=$env:PATH;$env:USERPROFILE\AppData\Local\Pub\Cache\bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Package Windows installer and ZIP
        run: flutter_distributor package --platform windows --targets exe,zip

      - name: Collect Windows release assets
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $exe = Get-ChildItem -Path dist -Filter *.exe -Recurse | Select-Object -First 1
          $zip = Get-ChildItem -Path dist -Filter *.zip -Recurse | Select-Object -First 1
          if (-not $exe) {
            Write-Error "Windows .exe installer was not generated"
          }
          if (-not $zip) {
            Write-Error "Windows .zip package was not generated"
          }
          Move-Item -Path $exe.FullName -Destination "dist/$env:ASSET_PREFIX`_windows_x64.exe" -Force
          Move-Item -Path $zip.FullName -Destination "dist/$env:ASSET_PREFIX`_windows_x64.zip" -Force
          Get-ChildItem -Path dist

      - name: Upload Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: dist/*
          if-no-files-found: error

  macos:
    name: macOS DMG
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release names
        run: |
          VERSION_RAW="$(sed -nE 's/^version:[[:space:]]*([^[:space:]]+).*/\1/p' pubspec.yaml | head -n 1)"
          VERSION="${VERSION_RAW/+/.}"
          echo "VERSION_RAW=${VERSION_RAW}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "ASSET_PREFIX=karing_${VERSION}" >> "$GITHUB_ENV"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "${{ env.FLUTTER_VERSION }}"
          channel: stable
          cache: true

      - name: Create CI private config fallback
        run: |
          mkdir -p lib/app/private
          cat > lib/app/private/ads_private.dart <<'DART'
          enum AdType {
            googleBannerAd,
            googleRewardedAd,
          }

          class AdsPrivate {
            static bool getEnable() => false;

            static String getAdID(AdType type, {String name = ''}) => '';
          }
          DART

      - name: Remove stale CocoaPods lockfile
        run: rm -f macos/Podfile.lock

      - name: Restore macOS VPN core from upstream release
        run: |
          mkdir -p bind/apple
          curl -L -o upstream-macos.dmg "${{ env.UPSTREAM_RELEASE_BASE }}/karing_1.2.20.2308_macos_universal.dmg"
          MOUNT_DIR="$(mktemp -d)"
          hdiutil attach upstream-macos.dmg -nobrowse -readonly -mountpoint "$MOUNT_DIR"
          cleanup() {
            hdiutil detach "$MOUNT_DIR" -quiet || true
            rm -rf "$MOUNT_DIR"
          }
          trap cleanup EXIT

          APP_PATH="$(find "$MOUNT_DIR" -name 'Karing.app' -type d -print | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "Unable to find Karing.app in upstream DMG"
            find "$MOUNT_DIR" -print | head -n 200
            exit 1
          fi

          CORE_FRAMEWORK="$APP_PATH/Contents/Library/SystemExtensions/com.nebula.karing.karingServiceSE.systemextension/Contents/Frameworks/LibVpnCore.framework"
          if [ ! -d "$CORE_FRAMEWORK" ]; then
            echo "Unable to find LibVpnCore.framework in upstream Karing.app"
            find "$APP_PATH/Contents/Library/SystemExtensions" -print | head -n 200
            exit 1
          fi

          ditto "$CORE_FRAMEWORK" bind/apple/LibVpnCore.framework

          for dylib in libswiftCore.dylib libswift_Concurrency.dylib; do
            DYLIB_PATH="$APP_PATH/Contents/Library/SystemExtensions/com.nebula.karing.karingServiceSE.systemextension/Contents/Frameworks/$dylib"
            if [ -f "$DYLIB_PATH" ]; then
              ditto "$DYLIB_PATH" "bind/apple/$dylib"
            fi
          done

          SE_BIN="$APP_PATH/Contents/Library/SystemExtensions/com.nebula.karing.karingServiceSE.systemextension/Contents/MacOS/com.nebula.karing.karingServiceSE"
          if [ -f "$SE_BIN" ]; then
            mkdir -p bind/apple/core
            cp "$SE_BIN" bind/apple/core/karingService
            chmod +x bind/apple/core/karingService
            file bind/apple/core/karingService
          fi

          MODULE_DIR="bind/apple/LibVpnCore.framework/Modules/LibVpnCore.swiftmodule"
          mkdir -p "$MODULE_DIR"
          for arch in x86_64 arm64 arm64e; do
            cat > "$MODULE_DIR/${arch}-apple-macos.swiftinterface" <<EOF
          // swift-interface-format-version: 1.0
          // swift-module-flags: -target ${arch}-apple-macos12.0 -enable-objc-interop -enable-library-evolution -swift-version 5 -module-name LibVpnCore
          public import Foundation
          public import NetworkExtension
          public import Swift
          public import _Concurrency
          public import _StringProcessing
          public import _SwiftConcurrencyShims
          @objc(_TtC10LibVpnCore17ExtensionProvider) @_inheritsConvenienceInitializers open class ExtensionProvider : NetworkExtension.NEPacketTunnelProvider {
            @objc override dynamic public init()
            override public func startTunnel(options: [Swift.String : ObjectiveC.NSObject]?) async throws
            override public func stopTunnel(with reason: NetworkExtension.NEProviderStopReason, completionHandler: @escaping () -> Swift.Void)
            override public func handleAppMessage(_ messageData: Foundation.Data) async -> Foundation.Data?
          }
          EOF
          done

          file bind/apple/LibVpnCore.framework/Versions/A/LibVpnCore
          find "$MODULE_DIR" -type f -print
          ls -lh bind/apple

      - name: Install dependencies
        run: flutter pub get

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Prepare unsigned macOS CI project
        run: |
          ruby <<'RUBY'
          project = 'macos/Runner.xcodeproj/project.pbxproj'
          text = File.read(project)

          text.gsub!(/^\t\t\t\tCEEC19F72B142FA90076CA70 \/\* LibVpnCore \*\/,\n/, '')
          text.gsub!(/\t\t\t\t\tCEEC19F72B142FA90076CA70 = \{\n\t\t\t\t\t\tCreatedOnToolsVersion = 15\.0\.1;\n\t\t\t\t\t\tLastSwiftMigration = 1500;\n\t\t\t\t\t\};\n/, '')
          text.gsub!(/\t\tCE35BDB52E31DEBF00E92FA7 \/\* PBXContainerItemProxy \*\/ = \{\n(?:\t\t\t.*\n)*?\t\t\};\n/, '')
          text.gsub!(/\t\tCE35BDB62E31DEBF00E92FA7 \/\* PBXTargetDependency \*\/ = \{\n(?:\t\t\t.*\n)*?\t\t\};\n/, '')
          text.gsub!(/^\t\t\t\t"DEVELOPMENT_TEAM\[sdk=macosx\*\]" = TNPM9PFX3W;\n/, '')
          text.gsub!(/^\t\t\t\tDEVELOPMENT_TEAM = TNPM9PFX3W;\n/, "\t\t\t\tDEVELOPMENT_TEAM = \"\";\n")
          text.gsub!(/^\t\t\t\t"PROVISIONING_PROFILE_SPECIFIER\[sdk=macosx\*\]" = "[^"]*";\n/, '')
          text.gsub!(/^\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "[^"]*";\n/, "\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"\";\n")
          text.gsub!(/^\t\t\t\t"CODE_SIGN_IDENTITY\[sdk=macosx\*\]" = "[^"]*";\n/, '')
          text.gsub!(/^\t\t\t\tCODE_SIGN_IDENTITY = "[^"]*";\n/, "\t\t\t\tCODE_SIGN_IDENTITY = \"-\";\n")
          text.gsub!(/^\t\t\t\tCODE_SIGN_STYLE = Automatic;\n/, "\t\t\t\tCODE_SIGN_STYLE = Manual;\n")
          text.gsub!(/^\t\t\t\tCODE_SIGNING_ALLOWED = YES;\n/, "\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n")
          text.gsub!(/^\t\t\t\tCODE_SIGNING_REQUIRED = YES;\n/, "\t\t\t\tCODE_SIGNING_REQUIRED = NO;\n")

          extension_configs = %w[
            CE35BDAE2E31DE9000E92FA7
            CE35BDAF2E31DE9000E92FA7
            CE35BDB02E31DE9000E92FA7
          ]
          extension_configs.each do |config_id|
            text.sub!(/(\t\t#{config_id} \/\* .*? \*\/ = \{\n\t\t\tisa = XCBuildConfiguration;\n\t\t\tbuildSettings = \{\n)/m) do
              prefix = Regexp.last_match(1)
              next Regexp.last_match(0) if Regexp.last_match(0).include?('FRAMEWORK_SEARCH_PATHS')

              prefix + <<~SETTINGS.gsub(/^/, "\t\t\t\t")
                FRAMEWORK_SEARCH_PATHS = (
                  "$(inherited)",
                  "$(PROJECT_DIR)/../bind/apple",
                );
                SWIFT_INCLUDE_PATHS = (
                  "$(inherited)",
                  "$(PROJECT_DIR)/../bind/apple",
                );
              SETTINGS
            end
          end

          File.write(project, text)
          RUBY
          ! grep -nE 'TNPM9PFX3W|macos-dev-karing|Developer ID Application|Apple Development' macos/Runner.xcodeproj/project.pbxproj

      - name: Install macOS pods
        run: |
          cd macos
          pod install --repo-update

      - name: Install packaging tools
        run: |
          dart pub global activate flutter_distributor
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
          npm install -g appdmg

      - name: Package macOS DMG
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: "-"
          DEVELOPMENT_TEAM: ""
          PROVISIONING_PROFILE_SPECIFIER: ""
        run: flutter_distributor package --platform macos --targets dmg --skip-clean

      - name: Inject service binary and re-sign app for local use
        run: |
          APP_PATH="$(find dist -name 'Karing.app' -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "Karing.app not found in dist:"
            find dist | head -n 30
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          if [ -f bind/apple/core/karingService ]; then
            cp bind/apple/core/karingService "$APP_PATH/Contents/MacOS/karingService"
            chmod +x "$APP_PATH/Contents/MacOS/karingService"
            codesign --force --sign - --timestamp=none "$APP_PATH/Contents/MacOS/karingService"
          fi

          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0"><dict>' \
            '  <key>com.apple.security.network.client</key><true/>' \
            '  <key>com.apple.security.network.server</key><true/>' \
            '  <key>com.apple.security.files.user-selected.read-write</key><true/>' \
            '</dict></plist>' > /tmp/karing.entitlements

          find "$APP_PATH/Contents/Frameworks" -name "*.framework" -type d | while read fw; do
            codesign --force --sign - --timestamp=none "$fw" 2>/dev/null || true
          done
          codesign --force --deep --sign - --timestamp=none \
            --entitlements /tmp/karing.entitlements "$APP_PATH"
          echo "Re-signed: $(codesign -dv "$APP_PATH" 2>&1 | head -3)"

      - name: Repackage DMG with re-signed app
        run: |
          APP_PATH="$(find dist -name 'Karing.app' -type d | head -n 1)"
          mkdir -p release-dist
          APP_DIR="$(dirname "$APP_PATH")"
          hdiutil create -volname "Karing" -srcfolder "$APP_DIR" -ov -format UDZO \
            "release-dist/${ASSET_PREFIX}_macos_universal.dmg"
          ls -lh release-dist

      - name: Upload macOS release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-macos
          path: release-dist/*
          if-no-files-found: error

  linux:
    name: Linux AppImage, DEB and RPM
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release names
        run: |
          VERSION_RAW="$(sed -nE 's/^version:[[:space:]]*([^[:space:]]+).*/\1/p' pubspec.yaml | head -n 1)"
          VERSION="${VERSION_RAW/+/.}"
          echo "VERSION_RAW=${VERSION_RAW}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "ASSET_PREFIX=karing_${VERSION}" >> "$GITHUB_ENV"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "${{ env.FLUTTER_VERSION }}"
          channel: stable
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            libc-ares-dev \
            libayatana-appindicator3-dev \
            libcurl4-openssl-dev \
            libfuse2 \
            libgtk-3-dev \
            libkeybinder-3.0-dev \
            libsecret-1-dev \
            plocate \
            ninja-build \
            rpm \
            unzip \
            zstd

      - name: Create CI private config fallback
        run: |
          mkdir -p lib/app/private
          cat > lib/app/private/ads_private.dart <<'DART'
          enum AdType {
            googleBannerAd,
            googleRewardedAd,
          }

          class AdsPrivate {
            static bool getEnable() => false;

            static String getAdID(AdType type, {String name = ''}) => '';
          }
          DART

      - name: Restore Linux service from upstream release
        run: |
          mkdir -p bind/linux/core
          curl -L -o upstream-linux.deb "${{ env.UPSTREAM_RELEASE_BASE }}/karing_1.2.20.2308_linux_amd64.deb"
          ar x upstream-linux.deb
          tar --use-compress-program=unzstd -xf data.tar.zst
          SERVICE_PATH="$(find . -type f -name karingService | head -n 1)"
          if [ -z "$SERVICE_PATH" ]; then
            echo "Unable to recover karingService from upstream Linux package"
            find . -maxdepth 5 -type f | sort | head -n 200
            exit 1
          fi
          cp "$SERVICE_PATH" bind/linux/core/karingService
          chmod +x bind/linux/core/karingService

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install packaging tools
        run: |
          dart pub global activate flutter_distributor
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
          curl -L -o /tmp/appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool.AppImage
          /tmp/appimagetool.AppImage --appimage-extract
          sudo mv squashfs-root /opt/appimagetool
          sudo tee /usr/local/bin/appimagetool >/dev/null <<'SH'
          #!/usr/bin/env bash
          exec /opt/appimagetool/AppRun "$@"
          SH
          sudo chmod +x /usr/local/bin/appimagetool
          appimagetool --version
          sudo updatedb || true

      - name: Package Linux formats
        env:
          CMAKE_PREFIX_PATH: /usr
          CURL_ROOT: /usr
        run: |
          set -e
          flutter_distributor package --platform linux --targets deb,rpm,appimage || {
            status=$?
            echo "Linux packaging failed with exit code ${status}"
            find dist -maxdepth 6 -type f -o -type d | sort || true
            exit "${status}"
          }

      - name: Collect Linux release assets
        run: |
          mkdir -p release-dist
          DEB_PATH="$(find dist -type f -name '*.deb' | head -n 1)"
          RPM_PATH="$(find dist -type f -name '*.rpm' | head -n 1)"
          APPIMAGE_PATH="$(find dist -type f -name '*.AppImage' | head -n 1)"
          if [ -z "$DEB_PATH" ] || [ -z "$RPM_PATH" ] || [ -z "$APPIMAGE_PATH" ]; then
            echo "Linux packages were not fully generated"
            find dist -maxdepth 5 -print || true
            exit 1
          fi
          mv "$DEB_PATH" "release-dist/${ASSET_PREFIX}_linux_amd64.deb"
          mv "$RPM_PATH" "release-dist/${ASSET_PREFIX}_linux_amd64.rpm"
          mv "$APPIMAGE_PATH" "release-dist/${ASSET_PREFIX}_linux_amd64.AppImage"
          ls -lh release-dist

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-linux
          path: release-dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - android
      - windows
      - macos
      - linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release names
        run: |
          VERSION_RAW="$(sed -nE 's/^version:[[:space:]]*([^[:space:]]+).*/\1/p' pubspec.yaml | head -n 1)"
          VERSION="${VERSION_RAW/+/.}"
          echo "VERSION_RAW=${VERSION_RAW}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "ASSET_PREFIX=karing_${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v${VERSION}-r${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: release-assets

      - name: Validate release asset set
        run: |
          set -euo pipefail
          expected=(
            "${ASSET_PREFIX}_android_arm.apk"
            "${ASSET_PREFIX}_android_arm64-v8a.apk"
            "${ASSET_PREFIX}_android_armeabi-v7a.apk"
            "${ASSET_PREFIX}_windows_x64.exe"
            "${ASSET_PREFIX}_windows_x64.zip"
            "${ASSET_PREFIX}_macos_universal.dmg"
            "${ASSET_PREFIX}_linux_amd64.AppImage"
            "${ASSET_PREFIX}_linux_amd64.deb"
            "${ASSET_PREFIX}_linux_amd64.rpm"
          )
          for file in "${expected[@]}"; do
            test -f "release-assets/${file}" || {
              echo "Missing release asset: ${file}"
              find release-assets -type f | sort
              exit 1
            }
          done
          ls -lh release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "Automated GitHub Actions release."
            echo
            echo "Version: ${VERSION_RAW}"
            echo "Commit: ${GITHUB_SHA}"
            echo
            echo "Assets follow the upstream Karing release naming pattern:"
            echo "- Android APKs: universal, arm64-v8a, armeabi-v7a"
            echo "- Windows: installer EXE and ZIP"
            echo "- macOS: universal DMG"
            echo "- Linux: AppImage, DEB and RPM"
          } > release-notes.md

          mapfile -t ASSETS < <(find release-assets -type f | sort)
          if [ "${#ASSETS[@]}" -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi

          gh release create "$RELEASE_TAG" "${ASSETS[@]}" \
            --title "Karing ${VERSION_RAW} (run ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT})" \
            --notes-file release-notes.md \
            --target "$GITHUB_SHA"
